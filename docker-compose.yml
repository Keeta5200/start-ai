services:
  caddy:
    image: caddy:2.8-alpine
    container_name: start-ai-caddy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    build:
      context: ./frontend
    container_name: start-ai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: http://backend:8080/api/v1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: start-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: START AI API
      API_V1_STR: /api/v1
      PROCESS_ROLE: web
      ENABLE_EMBEDDED_WORKER: "false"
      PORT: 8080
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-startai}:${POSTGRES_PASSWORD:-startai}@postgres:5432/${POSTGRES_DB:-startai}
      MOCK_STORAGE_DIR: /app/uploads_tmp
      INTERNAL_BACKEND_BASE_URL: http://backend:8080
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-change-me-too}
      WORKER_USE_INTERNAL_API: "false"
      CORS_ORIGINS: '["https://${APP_DOMAIN:-localhost}","https://${API_DOMAIN:-api.localhost}","http://${APP_DOMAIN:-localhost}","http://${API_DOMAIN:-api.localhost}"]'
    volumes:
      - uploads_tmp:/app/uploads_tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
    container_name: start-ai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: START AI API
      API_V1_STR: /api/v1
      PROCESS_ROLE: worker
      PORT: 8080
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-startai}:${POSTGRES_PASSWORD:-startai}@postgres:5432/${POSTGRES_DB:-startai}
      MOCK_STORAGE_DIR: /app/uploads_tmp
      INTERNAL_BACKEND_BASE_URL: http://backend:8080
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-change-me-too}
      WORKER_USE_INTERNAL_API: "false"
      ANALYSIS_WORKER_NICE: 10
    volumes:
      - uploads_tmp:/app/uploads_tmp

  postgres:
    image: postgres:16-alpine
    container_name: start-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startai}
      POSTGRES_USER: ${POSTGRES_USER:-startai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-startai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-startai} -d ${POSTGRES_DB:-startai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  uploads_tmp:
  caddy_data:
  caddy_config:
