version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: start-ai-db
    environment:
      POSTGRES_DB: startai
      POSTGRES_USER: startai
      POSTGRES_PASSWORD: startai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
